services:
  api_gateway:
    container_name: api_gateway
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    image: ib_mcp_api_gateway:v0.1
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - mcp_net
    volumes:
      - ./api_gateway/conf.yaml:/app/api_gateway/root/conf.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:5055/v1/api/iserver/auth/status -o /dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp_server:
    container_name: mcp_server
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    image: ib_mcp_mcp_server:v0.0
    ports:
      - "${MCP_SERVER_PORT}:${MCP_SERVER_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - ROUTERS_PATH=/app/mcp_server/routers
    deploy:
      resources:
        limits:
          memory: 160M
          cpus: '0.3'
        reservations:
          memory: 96M
    depends_on:
      api_gateway:
        condition: service_healthy
    networks:
      - mcp_net
    volumes:
      - ./mcp_server:/app/mcp_server
    stdin_open: true
    tty: true
    restart: unless-stopped

  mcp_market_data:
    container_name: mcp_market_data
    build:
      context: ./mcp_market_data
      dockerfile: Dockerfile
    image: ib_mcp_market_data:v0.1
    ports:
      - "${MCP_MARKET_DATA_PORT}:${MCP_MARKET_DATA_PORT}"
    env_file:
      - .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=${MCP_MARKET_DATA_PORT}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 160M
    networks:
      - mcp_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MCP_MARKET_DATA_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  mcp_sentiment:
    container_name: mcp_sentiment
    build:
      context: ./mcp_sentiment
      dockerfile: Dockerfile
    image: ib_mcp_sentiment:v0.1
    ports:
      - "${MCP_SENTIMENT_PORT}:${MCP_SENTIMENT_PORT}"
    env_file:
      - .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=${MCP_SENTIMENT_PORT}
      - MCP_SENTIMENT_INTERNAL_URL=http://mcp_sentiment:${MCP_SENTIMENT_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - GROK_API_KEY=${GROK_API_KEY}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - mcp_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MCP_SENTIMENT_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  rss_collector:
    container_name: rss_collector
    build:
      context: ./rss_collector
      dockerfile: Dockerfile
    image: ib_mcp_rss_collector:v0.1
    ports:
      - "${RSS_COLLECTOR_PORT}:${RSS_COLLECTOR_PORT}"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 192M
    networks:
      - mcp_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${RSS_COLLECTOR_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  scoring_engine:
    container_name: scoring_engine
    build:
      context: ./scoring_engine
      dockerfile: Dockerfile
    image: ib_mcp_scoring_engine:v0.1
    ports:
      - "5030:5030"
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://192.168.1.120:11434
      - OLLAMA_MODEL=llama3.2:3b
      - INFLUXDB_URL=http://192.168.1.123:8086
      - INFLUXDB_DATABASE=trading
      - INFLUXDB_USER=${INFLUXDB_USER:-trading_writer}
      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
      - MCP_MARKET_DATA_URL=http://mcp_market_data:${MCP_MARKET_DATA_PORT}
      - MCP_SENTIMENT_URL=http://mcp_sentiment:${MCP_SENTIMENT_PORT}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - OPENCLAW_API_URL=http://192.168.1.125:18789/v1/responses
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - AGENT_LAYERS_ENABLED=true
      - RISK_SIZING_ENABLED=true
      - FEEDBACK_ENABLED=true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    depends_on:
      mcp_market_data:
        condition: service_healthy
      mcp_sentiment:
        condition: service_healthy
    networks:
      - mcp_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

networks:
  mcp_net:
    driver: bridge

